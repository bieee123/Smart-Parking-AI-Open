<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark Pro - Roadway Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
        .vehicle-3d { transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .slot-row:hover .vehicle-3d { transform: scale(1.1) translateY(-4px); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); }
        
        .road-pattern {
            background-color: #1e293b;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        @keyframes road-flow {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }
        .road-marking {
            background: repeating-linear-gradient(
                to bottom,
                #fbbf24 0,
                #fbbf24 20px,
                transparent 20px,
                transparent 40px
            );
            width: 4px;
            height: 100%;
            animation: road-flow 2s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-200 min-h-screen p-4 md:p-12">

    <div class="max-w-5xl mx-auto space-y-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-16">
            <div>
                <span class="text-indigo-600 font-black text-xs uppercase tracking-[0.4em] mb-2 block">Visual Engineering</span>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Roadway Map Control</h1>
            </div>
            <div class="px-6 py-4 bg-white rounded-3xl shadow-xl border-4 border-slate-100">
                <span class="text-[10px] font-black uppercase text-slate-400">Status: High Fidelity Rendering</span>
            </div>
        </div>

        <!-- VERTICAL ZONES -->
        <script>
            const zones = [
                { id: 'A', name: 'Zone Alpha' },
                { id: 'B', name: 'Zone Beta' },
                { id: 'C', name: 'Zone Gamma' }
            ];

            function renderCar(facing, color = "#4338ca") {
                const transform = facing === 'left' ? 'scaleX(-1)' : '';
                return `
                    <svg class="vehicle-3d w-24 h-16" viewBox="0 0 120 80" style="transform: ${transform}">
                        <rect x="75" y="10" width="8" height="6" rx="3" fill="#1e1b4b" fill-opacity="0.5" />
                        <rect x="75" y="64" width="8" height="6" rx="3" fill="#1e1b4b" fill-opacity="0.5" />
                        <rect x="10" y="15" width="100" height="50" rx="20" fill="${color}" />
                        <rect x="35" y="20" width="45" height="40" rx="10" fill="white" fill-opacity="0.15" />
                        <path d="M 80 20 Q 105 20 105 40 Q 105 60 80 60 L 75 60 L 75 20 Z" fill="black" fill-opacity="0.4" />
                        <path d="M 35 20 Q 15 20 15 40 Q 15 60 35 60 Z" fill="black" fill-opacity="0.3" />
                    </svg>
                `;
            }

            function renderZone(zone) {
                return `
                    <div class="bg-white rounded-[56px] shadow-2xl border-4 border-slate-100 overflow-hidden mb-16">
                        <!-- Zone Title Overlay -->
                        <div class="px-12 pt-10 pb-6 flex justify-between items-center">
                            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">${zone.name}</h2>
                            <div class="flex gap-2">
                                <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Active Monitoring</span>
                            </div>
                        </div>

                        <!-- THE ROADWAY LAYOUT -->
                        <div class="flex h-[800px] border-t-4 border-slate-100">
                            
                            <!-- LEFT PARKING BLOCK (8 Slots - Facing Left) -->
                            <div class="w-[40%] flex flex-col bg-slate-50/50">
                                ${Array.from({length: 8}).map((_, i) => {
                                    const num = String(i * 2 + 1).padStart(2, '0');
                                    const occupied = Math.random() > 0.4;
                                    return `
                                        <div class="slot-row h-24 border-b-4 border-slate-100 flex items-center group cursor-pointer hover:bg-white transition-all">
                                            <div class="w-14 text-[10px] font-black text-slate-300 text-center border-r-4 border-slate-100 h-full flex items-center justify-center bg-slate-100/50">${zone.id}${num}</div>
                                            <div class="flex-1 flex items-center justify-center">
                                                ${occupied ? renderCar('left') : '<div class="w-20 h-10 border-2 border-dashed border-slate-200 rounded-2xl opacity-20"></div>'}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>

                            <!-- CENTRAL ROADWAY -->
                            <div class="flex-1 road-pattern relative flex justify-center border-x-8 border-slate-300">
                                <!-- Lane Marking -->
                                <div class="road-marking"></div>
                                
                                <!-- Directional Arrows (Floating) -->
                                <div class="absolute inset-0 flex flex-col justify-around items-center py-20 pointer-events-none opacity-20">
                                    <i data-lucide="chevrons-down" class="text-white w-12 h-12"></i>
                                    <i data-lucide="chevrons-down" class="text-white w-12 h-12"></i>
                                    <i data-lucide="chevrons-down" class="text-white w-12 h-12"></i>
                                </div>

                                <div class="absolute bottom-10 text-white/10 font-black text-4xl tracking-[1em] uppercase rotate-90 select-none">ROADWAY</div>
                            </div>

                            <!-- RIGHT PARKING BLOCK (8 Slots - Facing Right) -->
                            <div class="w-[40%] flex flex-col bg-slate-50/50">
                                ${Array.from({length: 8}).map((_, i) => {
                                    const num = String(i * 2 + 2).padStart(2, '0');
                                    const occupied = Math.random() > 0.4;
                                    return `
                                        <div class="slot-row h-24 border-b-4 border-slate-100 flex flex-row-reverse items-center group cursor-pointer hover:bg-white transition-all">
                                            <div class="w-14 text-[10px] font-black text-slate-300 text-center border-l-4 border-slate-100 h-full flex items-center justify-center bg-slate-100/50">${zone.id}${num}</div>
                                            <div class="flex-1 flex items-center justify-center">
                                                ${occupied ? renderCar('right') : '<div class="w-20 h-10 border-2 border-dashed border-slate-200 rounded-2xl opacity-20"></div>'}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            document.write(zones.map(renderZone).join(''));
        </script>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
