server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API → backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy AI / traffic → ai-service
    location /ai/ {
        proxy_pass http://ai-service:9000;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    location /traffic/ {
        proxy_pass http://ai-service:9000;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
